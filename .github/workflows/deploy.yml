name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate data.js from CSVs
        run: |
          python3 - << 'PYEOF'
          import csv, json, sys

          paises = []
          with open('paises.csv', newline='', encoding='utf-8') as f:
              for row in csv.DictReader(f):
                  paises.append({
                      'codigo': row['CODIGO'].strip(),
                      'nombre': row['NOMBRE'].strip()
                  })

          stickers = []
          with open('monitas.csv', newline='', encoding='utf-8') as f:
              for row in csv.DictReader(f):
                  row_id = row['ID'].strip()
                  if not row_id:
                      continue
                  stickers.append({
                      'id': row_id,
                      'nombre': row['NOMBRE'].strip(),
                      'pais': row_id[:3],
                      'completado': row['COMPLETADO'].strip().upper() == 'SI',
                      'extra': int(row.get('EXTRA', '0').strip() or '0')
                  })

          with open('data.js', 'w', encoding='utf-8') as f:
              f.write('const PAISES = ' + json.dumps(paises, ensure_ascii=False) + ';\n')
              f.write('const STICKERS = ' + json.dumps(stickers, ensure_ascii=False) + ';\n')

          print(f'data.js generado: {len(paises)} paises, {len(stickers)} figuritas', file=sys.stderr)
          PYEOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
